name: Build and Push Docker Image

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main", "master"]

env:
  REGISTRY: ghcr.io
  # github.repository is format <owner>/<repo_name> in lowercase
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: [self-hosted, Linux, x64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform compatibility
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into GitHub Container Registry (except on pull requests)
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata tags and labels for Docker image tagging
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
          # Convert repository name to lowercase automatically
          flavor: |
            latest=true

      # Get Git Short SHA
      - name: Get short Git SHA
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps deployment step
      - name: Update GitOps Repository
        if: github.event_name != 'pull_request'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_PAT }}
          SHORT_SHA: ${{ env.SHORT_SHA }}
        run: |
          # Clone the GitOps repository
          git clone https://${GITOPS_TOKEN}@github.com/Mateo2335/mediaMarktDemoGitOps.git GitOps

          # Use Node.js inline script to safely modify values.yaml across all environments
          node -e '
            const fs = require("fs");
            let content = fs.readFileSync("GitOps/mediamarkt/values.yaml", "utf8");
            content = content.replace(/(image:\s*\n(?:\s+.*\n)*\s+tag:\s*)(.*)/, `$1"sha-${process.env.SHORT_SHA}"`);
            fs.writeFileSync("GitOps/mediamarkt/values.yaml", content, "utf8");
            console.log("Successfully updated values.yaml tag to: sha-" + process.env.SHORT_SHA);
          '

          # Commit and Push changes
          cd GitOps
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mediamarkt/values.yaml
          git commit -m "chore(GitOps): update mediamarkt image tag to sha-${SHORT_SHA} [skip ci]"
          git push
